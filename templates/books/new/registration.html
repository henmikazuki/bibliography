{% extends "books/base.html" %} {% block title %}書籍登録{% endblock %} {% block
content %}
<h1>書籍登録</h1>
{% with messages = get_flashed_messages() %} {% if messages %}
<ul>
  {% for message in messages %}
  <li>{{ message }}</li>
  {% endfor %}
</ul>
{% endif %} {% endwith %}
<p>※は必須項目です。</p>
<form action="/books/new" method="post">
  <label for="title">※タイトル:</label>
  <input type="text" id="title" name="title" required /><br /><br />

  <label for="category">※カテゴリー:</label>
  <input type="text" id="category" name="category" required /><br /><br />

  <label for="status">※ステータス:</label>
  <select name="status" id="form-select">
    {% for s in status_choices %}
    <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
  </select>
  <br /><br />

  <label for="purchase_date">購入日:</label>
  <input type="date" id="purchase_date" name="purchase_date" /><br /><br />

  <label for="read_date">読了日:</label>
  <input type="date" id="read_date" name="read_date" /><br /><br />

  <input type="submit" value="登録" />
</form>
{% endblock %}
